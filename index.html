<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>싸이클 인터벌 타이머</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f23;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-circle {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
      transition: background 1s ease;
    }
    .bg-circle-1 { width: 400px; height: 400px; top: -100px; left: -100px; background: #ff4757; }
    .bg-circle-2 { width: 300px; height: 300px; bottom: -80px; right: -80px; background: #2ed573; }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 30px 20px;
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 2px;
      color: #a0a0c0;
      text-transform: uppercase;
    }

    /* 라운드 표시 */
    .rounds {
      display: flex;
      gap: 12px;
    }
    .round-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #2a2a4a;
      border: 2px solid #3a3a6a;
      transition: all 0.4s ease;
    }
    .round-dot.active { background: #ffd700; border-color: #ffd700; box-shadow: 0 0 10px #ffd700; }
    .round-dot.done { background: #2ed573; border-color: #2ed573; }

    /* 페이즈 레이블 */
    .phase-label {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 1px;
      transition: color 0.5s ease;
    }
    .phase-label.exercise { color: #ff4757; }
    .phase-label.rest { color: #2ed573; }
    .phase-label.ready { color: #a0a0c0; }

    /* 원형 타이머 */
    .timer-ring {
      position: relative;
      width: 260px;
      height: 260px;
    }
    .timer-ring svg {
      transform: rotate(-90deg);
    }
    .ring-bg {
      fill: none;
      stroke: #1e1e3a;
      stroke-width: 12;
    }
    .ring-progress {
      fill: none;
      stroke-width: 12;
      stroke-linecap: round;
      stroke-dasharray: 723;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke 0.5s ease;
    }
    .time-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .time-text {
      font-size: 64px;
      font-weight: 300;
      line-height: 1;
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
    }
    .time-sub {
      font-size: 13px;
      color: #606080;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    /* 다음 페이즈 */
    .next-phase {
      font-size: 15px;
      color: #606080;
      height: 20px;
    }

    /* 버튼 */
    .btn {
      width: 180px;
      height: 64px;
      border-radius: 32px;
      border: none;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .btn:active { transform: scale(0.95); }

    .btn-start {
      background: linear-gradient(135deg, #ff4757, #ff6b81);
      color: #fff;
      box-shadow: 0 8px 30px rgba(255, 71, 87, 0.4);
    }
    .btn-start.rest-mode {
      background: linear-gradient(135deg, #2ed573, #7bed9f);
      box-shadow: 0 8px 30px rgba(46, 213, 115, 0.4);
    }
    .btn-stop {
      background: linear-gradient(135deg, #2f3542, #3d4759);
      color: #a0a0c0;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    /* 완료 화면 */
    .done-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }
    .done-screen.visible { display: flex; }
    .done-icon { font-size: 72px; }
    .done-title { font-size: 28px; font-weight: 700; color: #ffd700; }
    .done-sub { font-size: 15px; color: #a0a0c0; line-height: 1.6; }

    /* 상태에 따른 배경 */
    body.exercise-mode .bg-circle-1 { opacity: 0.25; }
    body.rest-mode .bg-circle-1 { opacity: 0.05; }
    body.rest-mode .bg-circle-2 { opacity: 0.3; }
  </style>
</head>
<body>
<div class="bg-circle bg-circle-1"></div>
<div class="bg-circle bg-circle-2"></div>

<div class="container" id="mainScreen">
  <h1>싸이클 인터벌</h1>

  <div class="rounds" id="roundDots">
    <div class="round-dot active" id="dot0"></div>
    <div class="round-dot" id="dot1"></div>
    <div class="round-dot" id="dot2"></div>
    <div class="round-dot" id="dot3"></div>
  </div>

  <div class="phase-label ready" id="phaseLabel">준비</div>

  <div class="timer-ring">
    <svg width="260" height="260" viewBox="0 0 260 260">
      <circle class="ring-bg" cx="130" cy="130" r="115"/>
      <circle class="ring-progress" id="ringProgress" cx="130" cy="130" r="115"
        stroke="#ff4757"/>
    </svg>
    <div class="time-display">
      <div class="time-text" id="timeText">4:00</div>
      <div class="time-sub" id="timeSub">운동 시간</div>
    </div>
  </div>

  <div class="next-phase" id="nextPhase"></div>

  <button class="btn btn-start" id="mainBtn" onclick="handleMainBtn()">시작</button>
  <button class="btn btn-stop" id="stopBtn" onclick="stopAll()" style="display:none">중단</button>
</div>

<div class="container done-screen" id="doneScreen">
  <div class="done-icon">🏆</div>
  <div class="done-title">운동 완료!</div>
  <div class="done-sub">4세트 모두 완료했습니다.<br>수고하셨습니다!</div>
  <button class="btn btn-start" onclick="resetAll()" style="margin-top:10px">다시 시작</button>
</div>

<script>
  const EXERCISE_SEC = 4 * 60;
  const REST_SEC = 3 * 60;
  const TOTAL_ROUNDS = 4;

  let audioCtx = null;
  let round = 0;
  let isExercise = true;
  let secondsLeft = EXERCISE_SEC;
  let totalSeconds = EXERCISE_SEC;
  let timerId = null;
  let running = false;

  const CIRCUMFERENCE = 2 * Math.PI * 115;

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playBeep(freq, duration, type = 'sine', vol = 0.6) {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  }

  function playExerciseStart() {
    // 짧고 강렬한 3연속 삐 - 운동 시작
    playBeep(880, 0.15, 'square', 0.5);
    setTimeout(() => playBeep(880, 0.15, 'square', 0.5), 200);
    setTimeout(() => playBeep(1100, 0.4, 'square', 0.6), 400);
  }

  function playRestStart() {
    // 낮고 긴 삐 - 휴식
    playBeep(440, 0.3, 'sine', 0.5);
    setTimeout(() => playBeep(330, 0.6, 'sine', 0.4), 350);
  }

  function playDone() {
    // 완료 멜로디
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      setTimeout(() => playBeep(freq, 0.3, 'sine', 0.5), i * 200);
    });
  }

  function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}:${s.toString().padStart(2, '0')}`;
  }

  function updateRing() {
    const progress = secondsLeft / totalSeconds;
    const offset = CIRCUMFERENCE * (1 - progress);
    document.getElementById('ringProgress').style.strokeDashoffset = offset;
    document.getElementById('ringProgress').style.strokeDasharray = CIRCUMFERENCE;
  }

  function updateUI() {
    document.getElementById('timeText').textContent = formatTime(secondsLeft);
    updateRing();

    const phaseEl = document.getElementById('phaseLabel');
    const ringEl = document.getElementById('ringProgress');
    const mainBtn = document.getElementById('mainBtn');
    const nextEl = document.getElementById('nextPhase');
    const subEl = document.getElementById('timeSub');

    if (isExercise) {
      phaseEl.textContent = `운동 (${round + 1}세트)`;
      phaseEl.className = 'phase-label exercise';
      ringEl.style.stroke = '#ff4757';
      subEl.textContent = '운동 시간';
      document.body.className = 'exercise-mode';
      mainBtn.className = 'btn btn-start';
      if (round < TOTAL_ROUNDS - 1) {
        nextEl.textContent = `다음 → 3분 휴식`;
      } else {
        nextEl.textContent = `마지막 세트!`;
      }
    } else {
      phaseEl.textContent = '휴식';
      phaseEl.className = 'phase-label rest';
      ringEl.style.stroke = '#2ed573';
      subEl.textContent = '휴식 시간';
      document.body.className = 'rest-mode';
      mainBtn.className = 'btn btn-start rest-mode';
      nextEl.textContent = `다음 → ${round + 1}세트 운동`;
    }

    // 라운드 점
    for (let i = 0; i < TOTAL_ROUNDS; i++) {
      const dot = document.getElementById('dot' + i);
      dot.className = 'round-dot';
      if (i < round) dot.classList.add('done');
      else if (i === round) dot.classList.add('active');
    }
  }

  function tick() {
    if (secondsLeft <= 0) {
      nextPhase();
      return;
    }
    secondsLeft--;
    updateUI();
  }

  function nextPhase() {
    clearInterval(timerId);

    if (isExercise) {
      // 운동 끝 → 휴식 or 완료
      if (round >= TOTAL_ROUNDS - 1) {
        // 모든 세트 완료
        playDone();
        showDone();
        return;
      }
      isExercise = false;
      secondsLeft = REST_SEC;
      totalSeconds = REST_SEC;
      playRestStart();
    } else {
      // 휴식 끝 → 다음 운동
      round++;
      isExercise = true;
      secondsLeft = EXERCISE_SEC;
      totalSeconds = EXERCISE_SEC;
      playExerciseStart();
    }

    updateUI();
    timerId = setInterval(tick, 1000);
  }

  function handleMainBtn() {
    getAudioCtx(); // 유저 제스처로 AudioContext 초기화
    if (!running) {
      startTimer();
    }
  }

  function startTimer() {
    running = true;
    round = 0;
    isExercise = true;
    secondsLeft = EXERCISE_SEC;
    totalSeconds = EXERCISE_SEC;

    document.getElementById('mainBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'block';

    playExerciseStart();
    updateUI();
    timerId = setInterval(tick, 1000);
  }

  function stopAll() {
    clearInterval(timerId);
    running = false;
    resetAll();
  }

  function resetAll() {
    clearInterval(timerId);
    running = false;
    round = 0;
    isExercise = true;
    secondsLeft = EXERCISE_SEC;
    totalSeconds = EXERCISE_SEC;

    document.getElementById('mainScreen').style.display = 'flex';
    document.getElementById('doneScreen').classList.remove('visible');
    document.getElementById('mainBtn').style.display = 'block';
    document.getElementById('stopBtn').style.display = 'none';
    document.getElementById('mainBtn').textContent = '시작';
    document.getElementById('phaseLabel').textContent = '준비';
    document.getElementById('phaseLabel').className = 'phase-label ready';
    document.getElementById('nextPhase').textContent = '';
    document.getElementById('timeText').textContent = '4:00';
    document.getElementById('timeSub').textContent = '운동 시간';
    document.body.className = '';

    const ring = document.getElementById('ringProgress');
    ring.style.stroke = '#ff4757';
    ring.style.strokeDashoffset = 0;
    ring.style.strokeDasharray = CIRCUMFERENCE;

    for (let i = 0; i < TOTAL_ROUNDS; i++) {
      const dot = document.getElementById('dot' + i);
      dot.className = 'round-dot';
      if (i === 0) dot.classList.add('active');
    }
  }

  function showDone() {
    running = false;
    document.getElementById('mainScreen').style.display = 'none';
    document.getElementById('doneScreen').classList.add('visible');
    document.body.className = '';
  }

  // 초기 링 설정
  const ring = document.getElementById('ringProgress');
  ring.style.strokeDasharray = CIRCUMFERENCE;
  ring.style.strokeDashoffset = 0;
</script>
</html>
